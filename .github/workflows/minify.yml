name: Build and minify

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'web/entry.js'
      - 'build.js'
      - 'package.json'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build from source (minify)
        run: npm run build

      - name: Commit minified bundle under web/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f web/mojo-js.min.js
          git diff --staged --quiet || git commit -m "Build: update web/mojo-js.min.js"
          git push
