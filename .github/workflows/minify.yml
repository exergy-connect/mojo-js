name: Build and minify

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'web/entry.js'
      - 'build.js'
      - 'package.json'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build from source (minify)
        run: npm run build

      - name: Upload minified bundle
        uses: actions/upload-artifact@v4
        with:
          name: mojo-js-min
          path: web/mojo-js.min.js
