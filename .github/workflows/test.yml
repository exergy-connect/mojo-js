name: Test

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'test/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'test/**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Run tests
        run: npm test
